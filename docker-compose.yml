version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_USER=laperm_user
      - DB_PASSWORD=laperm_secure_pass
      - DB_NAME=saas_db
    volumes:
      - .:/app
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=laperm_user
      - POSTGRES_PASSWORD=laperm_secure_pass
      - POSTGRES_DB=saas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
